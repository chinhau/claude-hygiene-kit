name: gate self-test
on: [push, pull_request]
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Run gate pipe-tests
        working-directory: project-template
        run: bash .claude/hooks/test-gate.sh
